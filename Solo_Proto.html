<!DOCTYPE html>
<html class="staticrypt-html" lang="en">
    <head>
        <meta charset="utf-8" />
        <title>SOLŌ</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="robots" content="noindex, nofollow" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            :root{
                --bg:#EFEFEF; --l:#FFFFFF; --d:#D2D2D2;
                --td:#606060; --tm:#999999;
                --y1:#F8F4A0; --y2:#C8B820;
                --font:-apple-system,"Helvetica Neue",Arial,sans-serif;
            }
            * { box-sizing:border-box; }
            .staticrypt-html { height:100%; }
            .staticrypt-body { height:100%; margin:0; }
            .staticrypt-content {
                height:100%; margin:0;
                background:var(--bg);
                font-family:var(--font);
                -webkit-font-smoothing:antialiased;
                -moz-osx-font-smoothing:grayscale;
            }
            .staticrypt-page {
                min-height:100%;
                display:flex; align-items:center; justify-content:center;
                padding:24px;
            }
            .staticrypt-form {
                width:320px; max-width:100%;
                background:var(--bg);
                border-radius:30px;
                box-shadow:8px 8px 18px var(--d),-8px -8px 18px var(--l);
                padding:38px 30px 32px;
                text-align:center;
            }
            .staticrypt-instructions { margin-bottom:22px; }
            .staticrypt-title {
                font-size:30px; font-weight:200; color:var(--td);
                letter-spacing:0.3em; text-indent:0.3em; margin:0;
            }
            .solo-tag {
                font-size:11px; color:var(--tm);
                letter-spacing:0.06em; text-indent:0.06em;
                margin:8px 0 0;
            }
            .solo-instr {
                font-size:10px; color:var(--tm);
                line-height:1.6; margin:18px 4px 0;
            }
            .staticrypt-hr {
                margin:22px 0; border:0;
                height:0.5px;
                background:linear-gradient(90deg,transparent,var(--d),transparent);
            }
            .staticrypt-password-container {
                position:relative;
                background:var(--bg);
                border-radius:12px;
                box-shadow:inset 3px 3px 7px var(--d),inset -3px -3px 7px var(--l);
                margin:0 0 16px;
            }
            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background:transparent; border:0; outline:0;
                width:100%;
                font-family:var(--font); font-size:13px; color:var(--td);
                letter-spacing:0.04em;
                padding:14px 40px 14px 16px;
            }
            .staticrypt-form input::placeholder { color:var(--tm); }
            .staticrypt-toggle-password-visibility {
                cursor:pointer; position:absolute; right:6px; top:50%;
                transform:translateY(-50%);
                width:18px; height:18px; padding:11px; opacity:0.55;
            }
            label.staticrypt-remember {
                display:flex; align-items:center; justify-content:center;
                gap:9px; font-size:10px; color:var(--tm);
                letter-spacing:0.04em; margin:0 0 18px;
            }
            .staticrypt-remember input[type="checkbox"] { transform:scale(1.1); accent-color:var(--y2); }
            .staticrypt-decrypt-button {
                width:100%; border:0; cursor:pointer;
                border-radius:50px; padding:14px;
                font-family:var(--font); font-size:10px;
                letter-spacing:0.16em; text-transform:uppercase; font-weight:400;
                color:#5A5000;
                background:linear-gradient(135deg,var(--y2),var(--y1));
                box-shadow:inset 3px 3px 8px #A89A1090,inset -3px -3px 8px #FFFFF090,1px 1px 6px #C0B01840;
            }
            .staticrypt-decrypt-button:hover,
            .staticrypt-decrypt-button:active,
            .staticrypt-decrypt-button:focus { filter:brightness(96%); }

            .hidden { display:none !important; }
            .staticrypt-spinner-container { height:100%; display:flex; align-items:center; justify-content:center; }
            .staticrypt-spinner {
                display:inline-block; width:2rem; height:2rem;
                border:0.25em solid var(--d); border-right-color:var(--y2);
                border-radius:50%;
                animation:spinner-border 0.75s linear infinite;
            }
            @keyframes spinner-border { 100% { transform:rotate(360deg); } }
            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] { font-size:16px; }
            }
        </style>
    </head>

    <body class="staticrypt-body">

            <div class="staticrypt-spinner"></div>

                        <input type="submit" class="staticrypt-decrypt-button" value="Unlock" />
                    </form>
                </div>
            </div>
        </div>
