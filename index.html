<!DOCTYPE html>
<html class="staticrypt-html">
  <head>
    <meta charset="utf-8" />
    <title>SOLŌ — interactive prototype</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="pragma" content="no-cache" />
    <style>
      :root{
        --bg:#EFEFEF; --l:#FFFFFF; --d:#D2D2D2;
        --td:#606060; --tm:#999999;
        --y1:#F8F4A0; --y2:#C8B820;
        --font:-apple-system,"Helvetica Neue",Arial,sans-serif;
        --out:5px 5px 12px var(--d),-5px -5px 12px var(--l);
        --in:inset 3px 3px 7px var(--d),inset -3px -3px 7px var(--l);
      }
      *{box-sizing:border-box;margin:0;padding:0;}
      html,body{height:100%;}
      .staticrypt-body{background:var(--bg);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
      .hidden{display:none!important;}

      /* loading spinner */
      .staticrypt-spinner-container{min-height:100vh;display:flex;align-items:center;justify-content:center;width:100%;}
      .staticrypt-spinner{width:36px;height:36px;border-radius:50%;border:3px solid var(--d);border-top-color:var(--y2);animation:sc-spin .8s linear infinite;}
      @keyframes sc-spin{100%{transform:rotate(360deg);}}

      .staticrypt-form{width:340px;max-width:100%;background:var(--bg);border-radius:32px;box-shadow:var(--out);padding:40px 30px 34px;text-align:center;}
      .sc-mark{font-size:30px;letter-spacing:0.26em;color:var(--td);font-weight:300;padding-left:0.26em;}
      .sc-tag{font-size:9px;letter-spacing:0.22em;color:var(--y2);margin-top:8px;text-transform:uppercase;}
      .sc-instr{font-size:11px;color:var(--tm);line-height:1.7;margin-top:18px;}
      .staticrypt-hr{border:0;height:1px;background:linear-gradient(90deg,transparent,var(--d),transparent);margin:22px 0;}

      .staticrypt-password-container{position:relative;}
      .staticrypt-form input[type="password"],
      .staticrypt-form input[type="text"]{
        width:100%;background:var(--bg);border:none;border-radius:14px;box-shadow:var(--in);
        padding:14px 44px 14px 16px;font-family:var(--font);font-size:13px;color:var(--td);outline:none;letter-spacing:0.02em;
      }
      .staticrypt-form input::placeholder{color:var(--tm);letter-spacing:0.06em;}
      .staticrypt-toggle-password-visibility{position:absolute;right:15px;top:50%;transform:translateY(-50%);width:18px;height:18px;opacity:0.4;cursor:pointer;}

      .staticrypt-remember{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;font-size:10px;color:var(--tm);letter-spacing:0.04em;cursor:pointer;}
      .staticrypt-remember input[type="checkbox"]{accent-color:var(--y2);width:14px;height:14px;cursor:pointer;}

      .staticrypt-decrypt-button{
        width:100%;margin-top:22px;background:linear-gradient(135deg,var(--y2),var(--y1));
        box-shadow:inset 3px 3px 8px #A89A1090,inset -3px -3px 8px #FFFFF090,1px 1px 6px #C0B01840;
        color:#5A5000;border:none;border-radius:50px;padding:15px 28px;font-family:var(--font);
        font-size:11px;letter-spacing:0.18em;font-weight:500;cursor:pointer;
      }
      .staticrypt-decrypt-button:active{box-shadow:var(--in);}
      .sc-foot{font-size:8px;letter-spacing:0.1em;color:#CCCCCC;margin-top:22px;}
    </style>
  </head>
